<svg width="1600" height="920" viewBox="0 0 1600 920" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">repoview full loop visual proof</title>
  <desc id="desc">A single-screen workflow showing import, review, apply, and terminal execution in one loop.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0b1220"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#020617" flood-opacity="0.55"/>
    </filter>
    <style>
      .label { font: 700 24px Segoe UI, Arial, sans-serif; fill: #e5e7eb; letter-spacing: 0.5px; }
      .small { font: 500 18px Segoe UI, Arial, sans-serif; fill: #94a3b8; }
      .mono { font: 600 17px Consolas, monospace; fill: #cbd5e1; }
      .step { font: 700 20px Segoe UI, Arial, sans-serif; fill: #111827; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="920" fill="url(#bg)"/>
  <rect x="40" y="36" width="1520" height="848" rx="18" fill="url(#panel)" stroke="#334155" stroke-width="2" filter="url(#shadow)"/>

  <rect x="40" y="36" width="1520" height="56" rx="18" fill="#0b1322"/>
  <circle cx="76" cy="64" r="8" fill="#ef4444"/>
  <circle cx="102" cy="64" r="8" fill="#f59e0b"/>
  <circle cx="128" cy="64" r="8" fill="#10b981"/>
  <text x="160" y="71" class="small">repoview - import -> review -> apply -> terminal</text>

  <rect x="74" y="116" width="260" height="720" rx="14" fill="#0a1629" stroke="#1e293b"/>
  <text x="94" y="154" class="label">Repository</text>
  <text x="94" y="188" class="mono">RetroRender/</text>
  <text x="94" y="218" class="small">App.tsx</text>
  <text x="94" y="244" class="small">components/</text>
  <text x="94" y="270" class="small">services/</text>
  <text x="94" y="296" class="small">README.md</text>

  <rect x="370" y="116" width="790" height="450" rx="14" fill="#0a1629" stroke="#1e293b"/>
  <text x="398" y="154" class="label">Grounded Review</text>
  <text x="398" y="188" class="small">Answer is grounded in indexed local files.</text>
  <rect x="398" y="214" width="734" height="152" rx="10" fill="#111827" stroke="#334155"/>
  <text x="420" y="250" class="mono">Issue: missing null check in auth.ts line 87</text>
  <text x="420" y="282" class="mono">Fix: guard undefined token before parse()</text>
  <text x="420" y="314" class="mono">Impact: prevents login crash path</text>

  <rect x="398" y="392" width="734" height="146" rx="10" fill="#111827" stroke="#334155"/>
  <text x="420" y="428" class="mono">diff --git a/server/auth.ts b/server/auth.ts</text>
  <text x="420" y="460" class="mono">+ if (!token) return null;</text>
  <text x="420" y="492" class="mono">+ const payload = parseToken(token);</text>

  <rect x="1194" y="116" width="332" height="450" rx="14" fill="#0a1629" stroke="#1e293b"/>
  <text x="1222" y="154" class="label">Apply</text>
  <rect x="1222" y="184" width="276" height="56" rx="12" fill="url(#accent)"/>
  <text x="1322" y="219" text-anchor="middle" class="step">1-Click Apply</text>
  <text x="1222" y="276" class="small">Preview diff before write</text>
  <text x="1222" y="304" class="small">Safe overwrite to local file</text>

  <rect x="370" y="594" width="1156" height="242" rx="14" fill="#060d18" stroke="#1e293b"/>
  <text x="398" y="632" class="label">Persistent Terminal</text>
  <text x="398" y="666" class="mono">PS C:\repo> npm test</text>
  <text x="398" y="700" class="mono">PASS auth.test.ts</text>
  <text x="398" y="734" class="mono">PASS repo-sync.test.ts</text>
  <text x="398" y="768" class="mono">All checks passed in 3.8s</text>

  <path d="M 236 420 C 320 420, 320 300, 398 300" fill="none" stroke="#22d3ee" stroke-width="4"/>
  <polygon points="390,291 408,300 390,309" fill="#22d3ee"/>

  <path d="M 1160 300 C 1180 300, 1180 220, 1222 220" fill="none" stroke="#14b8a6" stroke-width="4"/>
  <polygon points="1214,211 1232,220 1214,229" fill="#14b8a6"/>

  <path d="M 1360 566 C 1360 584, 900 584, 900 594" fill="none" stroke="#38bdf8" stroke-width="4"/>
  <polygon points="891,586 900,604 909,586" fill="#38bdf8"/>

  <rect x="74" y="772" width="260" height="52" rx="10" fill="#e2e8f0"/>
  <text x="204" y="805" text-anchor="middle" class="step">Import</text>
  <rect x="622" y="116" width="280" height="42" rx="9" fill="#e2e8f0"/>
  <text x="762" y="144" text-anchor="middle" class="step">Review</text>
  <rect x="1270" y="516" width="180" height="42" rx="9" fill="#e2e8f0"/>
  <text x="1360" y="544" text-anchor="middle" class="step">Apply</text>
  <rect x="1240" y="776" width="286" height="46" rx="9" fill="#e2e8f0"/>
  <text x="1383" y="807" text-anchor="middle" class="step">Terminal</text>
</svg>

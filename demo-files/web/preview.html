<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demo Preview</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, sans-serif;
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(120deg, #f3f7ff 0%, #dce8ff 100%);
      }
      .card {
        width: min(720px, 90vw);
        background: #ffffff;
        border: 1px solid #d2ddf5;
        border-radius: 14px;
        padding: 24px;
        box-shadow: 0 10px 30px rgba(18, 41, 86, 0.12);
      }
      h1 { margin-top: 0; }
      .pill {
        display: inline-block;
        margin-right: 8px;
        padding: 4px 10px;
        border-radius: 999px;
        background: #e8f0ff;
        color: #1b3f7a;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Repodoc Demo HTML Preview</h1>
      <p>This file is useful for demonstrating source-view versus rendered-preview modes.</p>
      <span class="pill">HTML Preview</span>
      <span class="pill">Local Asset</span>
      <span class="pill">Demo Only</span>
    </div>
  </body>
</html>
